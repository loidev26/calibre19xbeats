<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- Favicon -->
	<link rel="icon" type="image/png" href="resources/images/logo.jpg">

	<!-- Bootstrap CSS Link -->
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

	<!-- External CSS -->
	<link rel="stylesheet" type="text/css" href="./index.css">

	<!-- Google Fonts Link -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans&family=Inter:opsz@14..32&display=swap" rel="stylesheet">

	<title>Calibre19xbeats</title>
</head>
<body class="bg-dark overflow-x-hidden m-0 vh-100">
	<!-- navbar start -->
  <nav class="navbar navbar-expand-lg bg-black navbar-dark fixed-top">
    <div class="container-fluid">

      <!-- Hamburger -->
      <button class="navbar-toggler" type="button" 
        data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar"
        aria-controls="offcanvasNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Brand -->
      <a class="navbar-brand text-smoke me-sm-auto ps-3" href="#">CalxB</a>
      <!-- Offcanvas / Navbar menu -->
      <div class="offcanvas offcanvas-start bg-black navbar-collapse" 
        tabindex="-1" 
        id="offcanvasNavbar">

        <div class="offcanvas-header">
          <h5 class="offcanvas-title text-smoke">
            Calibre19xbeats
          </h5>
          <button type="button" 
            class="btn-close" 
            data-bs-dismiss="offcanvas">
          </button>
        </div>

        <div class="offcanvas-body">

          <!-- Navigation -->
          <ul class="navbar-nav d-flex gap-3">
            <li class="nav-item">
              <a class="nav-link active" href="#">
                <span class="bi bi-house me-2 d-lg-none"></span>Home
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">
                <span class="bi bi-headphones me-2 d-lg-none"></span>Beats
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">
                <span class="bi bi-envelope me-2 d-lg-none"></span>Contact
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">
                <span class="bi bi-info-circle me-2 d-lg-none"></span>About
              </a>
            </li>
          </ul>

        <!-- Search -->
        <div class="input-group navbar-search my-auto ms-auto" style="max-width:350px;">
          <button class="btn btn-outline-light" type="button">
            <i class="bi bi-search"></i>
          </button>

          <input type="text"
            class="form-control bg-black text-light border-light"
            placeholder="Search...">

          <button class="btn btn-secondary dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown">
            Tracks
          </button>

          <ul class="dropdown-menu w-100">
            <li><a class="dropdown-item" href="#">Hard Trap</a></li>
            <li><a class="dropdown-item" href="#">Early 2000's x G-Funk West Coast</a></li>
            <li><a class="dropdown-item" href="#">Early 2000's R&B</a></li>
            <li><a class="dropdown-item" href="#">Afro Drill / Melodic Drill</a></li>
            <li><a class="dropdown-item" href="#">West Coast x Stockton CA</a></li>
            <li><a class="dropdown-item" href="#">2000's Hip Hop</a></li>
          </ul>

        </div>
      </div>
    </div>
    
    <!-- Cart + Login -->
    <div class="d-flex gap-2">
      <a class="btn btn-outline-light" href="#">
        <span class="bi bi-bag me-2"></span>Cart
      </a>
      <a class="btn btn-outline-light" href="#">
        <span class="bi bi-person me-2"></span>Log In
      </a>
    </div>
  </div>
</nav>
<!-- navbar end -->

	<!-- Bootstrap JS Script -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js
"></script>
</body>
</html>
